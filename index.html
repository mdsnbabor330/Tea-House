<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tea House | PH</title>
    <link rel="stylesheet" href="style.css" />
    <!-- tailwindcss cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fontawsome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#F4F4F4] font-[Manrope]">
    <main class="max-w-[1300px] mx-auto px-5 lg:px-0">
      <section class="flex flex-col lg:flex-row items-center mt-10 md:mt-30 justify-between gap-10">
        <div class="space-y-5 text-center lg:text-left">
          <h1 class="text-4xl md:text-6xl lg:text-[80px] font-extrabold" id="main-head">
            It's good <br class="hidden md:block" />tea time at The <br class="hidden md:block" />
            Tea House
          </h1>
          <p class="text-[#777777]">
            Tea and Botanical Solutions Supplier Give Optimum <br class="hidden md:block" />
            Sarisfaction To Your Taste Buds.
          </p>
          <button
            class="px-5 py-4 bg-linear-45 from-[#FF0000] to-[#FF8938] rounded-sm text-white cursor-pointer"
          >
            Explore More <i class="fa-solid fa-arrow-right -rotate-45"></i>
          </button>
        </div>
        <div class="relative">
          <div>
            <img src="./images/banner.png" alt="" class="w-full" />
          </div>
          <div
            class="flex items-center gap-4 py-4 px-6 absolute bottom-10 left-1/2 -translate-x-1/2 lg:left-20 lg:translate-x-0 bg-white rounded-xl shadow-xl w-max"
          >
            <img src="./images/star.png" alt="" />
            <div>
              <h3 class="text-2xl md:text-[30px] font-extrabold">5.00</h3>
              <p class="text-sm md:text-base text-[#777777]">Trust Pilot Ratings</p>
            </div>
          </div>
        </div>
      </section>
     
    </main>
    
  </body>
</html>
